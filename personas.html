<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2 - Personas</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <header>
        <h1>Ejercicio 2 - Tabla de Personas</h1>
    </header>

    <main>

        <a href="index.html" class="boton">Volver al inicio</a>

        <h2>Agregar persona</h2>

        <form id="formPersona">

            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="text" id="apellido" placeholder="Apellido" required>

            <input type="number" id="edad" placeholder="Edad" required>
            <input type="number" step="0.01" id="altura" placeholder="Altura (m)" required>
            <input type="number" step="0.1" id="peso" placeholder="Peso (kg)" required>

            <button type="submit">Agregar</button>

        </form>

        <h2>Lista de personas</h2>

        <table border="1">

            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Edad</th>
                    <th>Altura</th>
                    <th>Peso</th>
                    <th>IMC</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="tablaPersonas">
                
            </tbody>

        </table>

    </main>

    <script src="js/personas.js"></script>

</body>

</html>
